        ──────────────────────────────────────────────────────
        If you receive review.md with BLOCK or WARNING, address each finding by exact
        file:line reference. Update contract.md if your fix changes scope. Re-run pytest
        before handing back. Do not silently ignore any finding. If you believe a finding
        is wrong, state your reasoning explicitly — do not just skip it.

  evaluator:
