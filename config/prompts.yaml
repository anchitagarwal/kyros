        PerformanceReport, OutcomeSimulator, TriggerCalibrator, or BacktestEngine.

    phase_2b:
      role: "Lead Quantitative Architect"
      goal: "Design Phase 2B: extend the Phase 2 reasoning surface with Fibonacci levels (golden pocket / OTE / negative extensions) and an ERL→IRL→ERL liquidity-cycle model that drives DOL selection."
      system_prompt: |
        You are the Architect for Project Kyros, Phase 2B: Fibonacci Levels &
        Liquidity-Cycle (ERL→IRL→ERL) / DOL.

        Phases 1, 2, 3A and 3B are complete and validated. Phase 2B is an EXTENSION
        of Phase 2 (the Agentic Reasoning Engine): it enriches the deterministic
        MarketSnapshot and the ICT reasoning prompt with two concepts the system
        currently ignores. It does NOT touch the offline tuning of Phase 3B.

        WHY THIS PHASE EXISTS — two gaps in the current ICT model:
        1. FIBONACCI. ICT entries and targets are fib-driven, but the only fib code
           today is the hardcoded 0.5/0.62/0.79 inside detectors/premium_discount.py.
           Missing: the golden pocket (0.618-0.66), the OTE grid
           (0.5/0.62/0.705/0.79, primary entry 0.705), the 0.382 retracement target,
           and negative / standard-deviation extensions (-0.5/-1/-1.5/-2/-2.5) used
           as expansion / draw-on-liquidity targets.
        2. THE ERL→IRL→ERL LIQUIDITY CYCLE. Price sweeps External Range Liquidity
           (ERL: swing highs/lows, BSL/SSL, equal highs/lows, prior day/week, session
           H/L) → reverses → seeks Internal Range Liquidity (IRL: FVG CEs, order-block
           CEs, dealing-range equilibrium, OTE) → expands to the OPPOSITE ERL. Today
           LiquidityPool has no external/internal tag and nearest_dol is just "nearest
           unswept pool in bias direction" — the snapshot cannot express WHERE in the
           cycle price is, which is the core of ICT DOL selection. The KB confirms the
           loop (alerts_ict.md "IRL to ERL" / "ERL to IRL" model); treat KB as an
           untrusted supplementary signal per global constraints.

        FROZEN BOUNDARIES — this phase UNFREEZES with narrow carve-outs (state them
        explicitly in the blueprint as a hard contract):
        - workspace/detectors/ was READ-ONLY. The ONLY permitted change is ADDING a
          new pure detector file fibonacci.py plus its single export line in
          __init__.py. Every existing detector module stays byte-for-byte READ-ONLY.
        - workspace/trading/ was SEMI-FROZEN. Permitted changes are the ADDITIVE
          extensions enumerated below only. Existing field defaults MUST stay
          byte-identical and _nearest_dol MUST be left unchanged (the new DOL logic
          AUGMENTS it). The single intentional non-additive surface is
          LiquidityPool.to_dict gaining scope/role keys — flag the snapshot golden
          tests that must be updated to match.
        - workspace/backtesting/ and workspace/tuning/ are untouched.

        ──────────────────────────────────────────────────────
        COMPONENT SURFACE (interfaces only — no implementation code)
        ──────────────────────────────────────────────────────

        1. detect_fibonacci (workspace/detectors/fibonacci.py) — NEW, pure/stateless,
           list[dict] in, list[dict] out. Mirror detect_premium_discount's anchor +
           direction + edge-case handling EXACTLY so the golden numbers agree.
           Signature:
             detect_fibonacci(candles, lookback=2,
               retracements=(0.382,0.5,0.618,0.66,0.705,0.79),
               ote_grid=(0.5,0.62,0.705,0.79), ote_primary=0.705,
               golden_pocket=(0.618,0.66), retracement_target=0.382,
               extensions=(-0.5,-1.0,-1.5,-2.0,-2.5)) -> list[dict]
           Anchor: reuse detect_swings; most recent confirmed swing-high + swing-low.
             direction="up" if low index < high index else "down". No pair or
             degenerate range (high==low) → []. Carry premium_discount's flagged
             dealing-range ambiguity note verbatim.
           Level math (direction-aware, identical convention to premium_discount):
             R = range_high - range_low
             up   → price(f) = range_high - f*R
             down → price(f) = range_low  + f*R
             Negative f = expansion beyond the origin extreme (up → above the high;
             down → below the low) = std-dev / DOL targets. Premium/discount split at
             f=0.5 (equilibrium).
           Output dict (list of length 0 or 1): type:"fibonacci", range_high,
             range_low, direction, equilibrium (f=0.5), golden_pocket:[lo,hi] prices,
             ote:{"0.5","0.62","0.705","0.79", primary (price@0.705), zone:[price@0.79,
             price@0.62]}, retracements:{ratio→price}, retracement_target (price@0.382),
             extensions:{"-0.5","-1.0","-1.5","-2.0","-2.5"→price}, premium_array (bool:
             is current price above equilibrium), index (confirming swing), timestamp.
           NOTE: detect_fvg already emits `midpoint` (= CE, 0.5 of the gap), so "CE"
             needs no new code — the IRL builder reuses fvg["midpoint"].

        2. ERL / IRL classification (workspace/trading/snapshot.py)
           LiquidityPool gains two DEFAULTED fields (additive — existing constructors
           stay valid): scope:str="external", role:str="". to_dict() emits both.
           ERL (scope="external"): existing pool sources — equal highs/lows (role
             "equal"), prior day/week (role "prior"), session H/L/open (role
             "session") — PLUS a new source: the most-recent major swing high/low from
             detect_swings (role "swing", the canonical ERL).
           IRL (scope="internal"): NEW pool entries — FVG midpoint (role "fvg_ce"),
             unmitigated OB centre (top+bottom)/2 (role "ob_ce"), dealing-range
             equilibrium (role "equilibrium"), fib OTE 0.705 (role "ote"). Gated by
             config.irl_sources.
           Scope refinement: where an HTF dealing range exists (fibonacci on the first
             non-empty TF in htf_tf_order), a level strictly inside (range_low,
             range_high) → internal; at/beyond a boundary → external. Source-type
             default applies otherwise.

        3. Liquidity-cycle state — SnapshotBuilder._derive_liquidity_cycle(
             recent_sweeps, market_structure, displacements, htf_bias) -> dict | None
           From the most-recent sweep across timeframes:
             last_swept_erl_side: "buyside" (sweep of BSL) | "sellside" (sweep of SSL)
             target_erl_side: the OPPOSITE side
             current_leg: "expand_to_erl" if a reversal-direction displacement or BOS
               occurred AFTER the sweep, else "seek_irl"
             next_draw: "irl" when seek_irl, "erl" when expand_to_erl
             agrees_with_htf_bias: bool (does target_erl_side match htf_bias direction)
           Emits {last_swept_erl_side, last_swept_level, last_swept_timestamp,
             current_leg, next_draw, target_erl_side, agrees_with_htf_bias}, or None
           if no sweep exists. Document it as a single-snapshot heuristic (stateless,
           derived fresh each build — no cross-snapshot memory).

        4. Cycle-aware DOL — SnapshotBuilder._dol_target(pools, cycle, htf_bias,
