              confirmed break. Extract htf_bias_source (timeframe, type, index, timestamp)
              from the same event — do not set htf_bias without setting htf_bias_source.
            all_pools: build LiquidityPool from detect_swings equal H/L + detect_prior_levels
              + detect_session_levels output. Compute confluence_count by counting pools
