        ──────────────────────────────────────────────────────
        CONTINUATION — WEIGHTED "CLEAREST DOL" SCORING
        (supersedes the nearest-only DOL in components 4 & 6 above)
        ──────────────────────────────────────────────────────
        The DOL must NOT be chosen by proximity alone. The KB is explicit that the
        nearest pool is "Low Hanging Fruit" — a first-TP waypoint, not the dominant
        draw. Replace the nearest / first-match DOL with a DETERMINISTIC WEIGHTED
        CLARITY SCORE per candidate, expose the RANKED list to the LLM, and make
        dol_target the argmax.

        8. Weighted DOL scoring (workspace/trading/snapshot.py)
           SnapshotBuilder._score_pool(pool, *, htf_bias, cycle, htf_fib,
             current_price, killzone, pools) -> (score: float, breakdown: dict).
             PURE function of its arguments (determinism). Linear sum of weighted
             factor terms; every factor maps to an EXISTING signal:
               timeframe   : pool.timeframe → config.tf_weights (4h≫1h≫15m≫5m≫1m)
               role        : pool.role → config.role_weights
                             (equal > prior > session > swing > fvg_ce/ob_ce/
                             equilibrium/ote)
               cycle_align : matches liquidity_cycle (expand_to_erl → external pool on
                             target_erl_side; seek_irl → internal pool in the reversal
                             direction) — large positive
               bias_align  : pool side agrees with htf_bias (bsl&bullish / ssl&bearish)
               confluence  : + w * pool.confluence_count
               pd_align    : reaching the pool moves price across htf_fib.equilibrium
                             toward the opposite side; penalize if already spent
               clean_path  : − w * (count of OPPOSING unswept EXTERNAL pools strictly
                             between current_price and pool.level) — the LRLR factor;
                             this IS the intermediate-liquidity guard, made numeric
               proximity   : + small w * normalized distance (distance_points / R) —
                             LOW weight, tiebreak only, so LHF cannot dominate
               killzone    : + small w if current_killzone is set (optional)
             Each weight is a config knob (see 10) so Phase 3B can tune it. The
             breakdown dict itemizes each factor's contribution (for the LLM + tests).

           SnapshotBuilder._rank_dols(pools, *, htf_bias, cycle, htf_fib,
             current_price, killzone) -> list[LiquidityPool]: filter candidates to the
             correct side FIRST (bsl above price for a buyside draw, ssl below for a
             sellside draw — structurally prevents a wrong-side target), score each via
             _score_pool, return sorted by clarity_score DESC with a stable distance
             tiebreak.

