            Writes workspace/calibration_report.json on completion.
            estimated_llm_cost_usd = total_fires × 0.003
 
        workspace/backtesting/outcome.py
          TradeOutcome: dataclass — result, candles_to_fill, candles_to_resolution,
            fill_price, exit_price, actual_rr
          OutcomeSimulator()
          simulate(alert: AlertPayload, subsequent_candles: list[dict]) → TradeOutcome
            subsequent_candles must contain ONLY candles after alert.timestamp.
            No validation of this inside simulate() — caller's responsibility.
            If alert.bias == "no_trade": return TradeOutcome(result="no_trade")
            Fill detection: iterate subsequent_candles until price enters entry_zone.
              Long fill: candle.low <= entry_zone[1] and candle.high >= entry_zone[0]
              Short fill: same condition (price range overlaps entry_zone)
              Fill price: entry_mid = (entry_zone[0] + entry_zone[1]) / 2
            Outcome detection (from candle AFTER fill candle, not fill candle itself):
              Long win:  candle.high >= alert.target
              Long loss: candle.low  <= alert.stop
              Short win: candle.low  <= alert.target
              Short loss:candle.high >= alert.stop
              Both in same candle: loss (conservative)
            Killzone expiry check: compare candle.timestamp against alert.valid_until
              No fill by valid_until: result="no_fill"
              Filled but unresolved by valid_until: result="expired"
            actual_rr:
              Win:  (exit_price - fill_price) / abs(fill_price - alert.stop) for long
              Loss: negative of the same formula
              null for no_fill, no_trade, expired
 
        workspace/backtesting/engine.py
          TradeTrace: dataclass — all fields per trade trace schema
          BacktestEngine(loop: TradingLoop, simulator: OutcomeSimulator,
                         output_path: Path = Path("workspace/trade_traces.jsonl"))
          run(source: CandleSource) → list[TradeTrace]
            Resume logic: read existing output_path, collect processed timestamps.
              Skip candles whose alert.timestamp is already in the file.
            For each alert emitted by TradingLoop:
              Collect subsequent_candles from the replay buffer (candles after alert.timestamp)
              Call simulator.simulate(alert, subsequent_candles)
              Build TradeTrace, append JSON line to output_path
            Returns list of all TraceTrace objects (including resumed ones)
 
          Replay buffer: BacktestEngine maintains a rolling buffer of recent candles
            per timeframe to supply OutcomeSimulator. Buffer must hold at least
            480 1m candles (8 hours — enough to resolve intraday outcomes).
            These are candles AFTER the alert, not used by TradingLoop — they are
