             cycle is None OR config.dol_use_cycle is False → fall back to nearest_dol
             current_leg == "seek_irl"      → nearest unswept INTERNAL pool in the
                                              reversal direction
             current_leg == "expand_to_erl" → nearest unswept EXTERNAL pool on
                                              target_erl_side, beyond equilibrium
             bias conflict → prefer htf_bias and set cycle.agrees_with_htf_bias=False
           Stored on the snapshot as a NEW field dol_target.

        5. MarketSnapshot wiring — new fields: fib_levels: dict[str,list[dict]],
