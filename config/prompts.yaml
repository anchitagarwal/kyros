        test_calibrator.py
          TriggerCalibrator with MockCandleSource(scenario="flat"):
            total_fires = 0, gate_blocks["no_killzone"] > 0
          MockCandleSource(scenario="killzone_active"):
            gate_blocks["no_htf_bias"] or ["no_dol"] > 0
          MockCandleSource(scenario="sweep_and_fvg"):
            total_fires > 0
          calibration_report.json written with all required keys.
 
        test_outcome.py
          Long win: subsequent candles reach target before stop → result="win",
            actual_rr positive.
          Long loss: subsequent candles reach stop before target → result="loss",
            actual_rr negative.
          Ambiguous (same candle high >= target AND low <= stop) → result="loss".
          No fill before valid_until → result="no_fill", actual_rr=None.
          Filled but neither hit before valid_until → result="expired".
          no_trade alert → result="no_trade" immediately, no candle iteration.
          CRITICAL: test that passing the alert candle as first subsequent candle
            causes incorrect outcome — document why caller must not do this.
 
        test_engine.py
          BacktestEngine with MockCandleSource(scenario="sweep_and_fvg"),
            TradingLoop and LLMReasoningAgent mocked to return fixture AlertPayload.
