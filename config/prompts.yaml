        workspace/backtesting/report.py
          PerformanceReport()
          generate(traces: list[TradeTrace]) → str
            Computes all metrics. Writes workspace/backtest_report.md. Returns markdown.
            profit_factor = sum(winning actual_rr) / abs(sum(losing actual_rr))
            max_drawdown_r: running R cumsum, track peak, max(peak - current)
            expectancy = mean(actual_rr, treating no_trade/no_fill/expired as 0)
            golden_match_rate: load workspace/knowledge_base/golden_alerts.json,
              for each entry find if any trace within 15 min has matching direction
            system_prompt_hash: sha256(ICT_SYSTEM_PROMPT)[:8] from reasoning_agent.py
 
        ──────────────────────────────────────────────────────
        TESTS (tests/phase3a/)
        ──────────────────────────────────────────────────────
        test_data_loader.py
          DataLoader with yfinance backend mocked (no real HTTP).
